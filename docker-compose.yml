# 模块1：MySQL + 后端 API + 前端（生产构建由 Nginx 提供静态资源）
services:
  mysql:
    image: mysql:8.0
    container_name: meeting-booking-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123"
      MYSQL_DATABASE: meeting_booking
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - meeting_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/meeting-booking-api
      dockerfile: Dockerfile
    container_name: meeting-booking-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: meeting_booking
      DB_USERNAME: root
      DB_PASSWORD: "123"
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: ./frontend/meeting-booking-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/api/v1
    container_name: meeting-booking-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  meeting_mysql_data:
